<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nulacademy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    </style>
</head>
<body class="bg-slate-50 h-screen flex">

    <!-- LOGIN PAGE -->
    <div id="login-page" class="fixed inset-0 gradient-bg flex items-center justify-center z-50 p-4">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md">
            <div class="text-center mb-6">
                <div class="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center text-white text-2xl mx-auto mb-3 shadow-lg"><i class="ri-graduation-cap-fill"></i></div>
                <h1 class="text-2xl font-extrabold">Nulacademy</h1>
            </div>
            <form id="loginForm" class="space-y-4">
                <input type="email" id="loginEmail" class="w-full px-4 py-3 rounded-xl bg-slate-50" placeholder="Email" required>
                <input type="password" id="loginPass" class="w-full px-4 py-3 rounded-xl bg-slate-50" placeholder="Password" required>
                <button type="submit" class="w-full py-3 bg-indigo-600 text-white font-bold rounded-xl">Login</button>
            </form>
            <p class="text-center text-sm text-slate-500 mt-4">Belum punya akun? <a href="#" onclick="Swal.fire('Info', 'Hubungi Teacher untuk pendaftaran atau Daftar sebagai Siswa', 'info')" class="text-indigo-600 font-bold">Daftar</a></p>
            <!-- Button Register Hidden untuk memudahkan, aktifkan jika perlu -->
            <button onclick="document.getElementById('regModal').classList.toggle('hidden')" class="w-full mt-2 text-xs text-slate-400">Daftar Siswa Baru (Hidden)</button>
            
            <div id="regModal" class="hidden mt-4 p-4 border rounded-xl bg-slate-50">
                <form id="registerForm" class="space-y-2">
                    <input type="text" id="regNama" class="w-full px-3 py-2 rounded-lg bg-white border" placeholder="Nama" required>
                    <input type="email" id="regEmail" class="w-full px-3 py-2 rounded-lg bg-white border" placeholder="Email" required>
                    <input type="password" id="regPass" class="w-full px-3 py-2 rounded-lg bg-white border" placeholder="Password" required>
                    <button type="submit" class="w-full py-2 bg-green-500 text-white text-sm rounded-lg">Register</button>
                </form>
            </div>
        </div>
    </div>

    <!-- APP SHELL -->
    <div id="app-shell" class="hidden flex w-full h-full">
        <!-- SIDEBAR -->
        <aside class="w-64 bg-white border-r flex flex-col shadow-sm h-screen">
            <div class="p-5 border-b flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white"><i class="ri-graduation-cap-fill"></i></div>
                <span class="font-bold text-lg">Nulacademy</span>
            </div>
            <nav class="flex-1 p-4 space-y-1">
                <a onclick="loadPage('dashboard')" class="menu-item active flex items-center gap-3 px-4 py-2.5 rounded-xl cursor-pointer font-semibold text-slate-600 hover:bg-slate-50"><i class="ri-home-5-line"></i> Dashboard</a>
                <a onclick="loadPage('courses')" class="menu-item flex items-center gap-3 px-4 py-2.5 rounded-xl cursor-pointer font-semibold text-slate-600 hover:bg-slate-50"><i class="ri-book-open-line"></i> Courses</a>
                <a onclick="loadPage('sosial')" class="menu-item flex items-center gap-3 px-4 py-2.5 rounded-xl cursor-pointer font-semibold text-slate-600 hover:bg-slate-50"><i class="ri-message-3-line"></i> Sosial</a>
                
                <div id="admin-menu" class="hidden">
                    <hr class="my-3">
                    <p class="px-4 text-xs text-slate-400 font-bold uppercase">Teacher Zone</p>
                    <a onclick="loadPage('submissions')" class="menu-item flex items-center gap-3 px-4 py-2.5 rounded-xl cursor-pointer font-semibold text-slate-600 hover:bg-slate-50"><i class="ri-file-list-3-line"></i> Nilai Tugas</a>
                    <a onclick="loadPage('students')" class="menu-item flex items-center gap-3 px-4 py-2.5 rounded-xl cursor-pointer font-semibold text-slate-600 hover:bg-slate-50"><i class="ri-team-line"></i> Kelola Siswa</a>
                </div>
            </nav>
            <div class="p-4 border-t">
                <div class="text-xs text-slate-400 mb-2">Logged in as: <span id="lbl-role" class="font-bold text-indigo-600"></span></div>
                <button onclick="logout()" class="w-full text-left text-red-500 font-semibold text-sm hover:text-red-700"><i class="ri-logout-box-r-line"></i> Logout</button>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="flex-1 bg-slate-50 overflow-y-auto">
            <div id="content-area" class="p-8"></div>
        </main>
    </div>

    <script>
        const API = '/.netlify/functions/api';
        let TOKEN = localStorage.getItem('token');
        let USER = JSON.parse(localStorage.getItem('user') || 'null');
        let CURRENT_VIEW = {}; // Untuk menyimpan state halaman

        window.onload = () => { if (TOKEN && USER) showApp(); else showLogin(); };

        function showApp() {
            document.getElementById('login-page').classList.add('hidden');
            document.getElementById('app-shell').classList.remove('hidden');
            document.getElementById('lbl-role').innerText = USER.role;
            if(USER.role === 'teacher') document.getElementById('admin-menu').classList.remove('hidden');
            loadPage('dashboard');
        }
        function showLogin() { document.getElementById('login-page').classList.remove('hidden'); document.getElementById('app-shell').classList.add('hidden'); }
        function logout() { localStorage.clear(); window.location.reload(); }

        // --- AUTH ---
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            try {
                const res = await fetch(`${API}/login`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ email: document.getElementById('loginEmail').value, password: document.getElementById('loginPass').value }) });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error);
                TOKEN = data.token; USER = data.user;
                localStorage.setItem('token', TOKEN); localStorage.setItem('user', JSON.stringify(USER));
                showApp();
            } catch (err) { Swal.fire('Gagal', err.message, 'error'); }
        };

        document.getElementById('registerForm').onsubmit = async (e) => {
            e.preventDefault();
            try {
                const res = await fetch(`${API}/register`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ nama: document.getElementById('regNama').value, email: document.getElementById('regEmail').value, password: document.getElementById('regPass').value }) });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error);
                Swal.fire('Sukses', 'Akun dibuat. Silakan Login.', 'success');
                document.getElementById('regModal').classList.add('hidden');
            } catch (err) { Swal.fire('Error', err.message, 'error'); }
        };

        // --- NAVIGASI ---
        function loadPage(page) {
            const area = document.getElementById('content-area');
            document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active', 'bg-indigo-50', 'text-indigo-600'));
            document.querySelectorAll('.menu-item').forEach(el => { if(el.getAttribute('onclick')?.includes(`'${page}'`)) el.classList.add('active', 'bg-indigo-50', 'text-indigo-600'); });
            
            if(page === 'dashboard') renderDashboard();
            else if(page === 'courses') renderCourses();
            else if(page === 'sosial') renderSosial();
            else if(page === 'students') renderAdminStudents();
            else if(page === 'submissions') renderSubmissions();
        }

        // --- DASHBOARD ---
        async function renderDashboard() {
            const area = document.getElementById('content-area');
            // Ambil nilai terbaru
            const res = await fetch(`${API}/submissions`, { headers: { 'Authorization': `Bearer ${TOKEN}` }});
            const subs = USER.role === 'teacher' ? [] : await res.json(); // Student only
            const myGrades = subs.filter(s => s.nilai !== null);

            area.innerHTML = `
                <div class="mb-8">
                    <h1 class="text-3xl font-bold text-slate-800">Halo, ${USER.nama}!</h1>
                    <p class="text-slate-500 mt-1">ID Anda: <span class="font-mono bg-slate-200 px-2 py-0.5 rounded">${USER.kode_unik}</span> | Paket: <span class="font-bold text-indigo-600">${USER.paket_aktif}</span></p>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                    <div class="bg-white p-6 rounded-2xl shadow-sm border">
                        <h3 class="text-slate-400 text-sm">Status Paket</h3>
                        <p class="text-2xl font-bold mt-1">${USER.paket_aktif}</p>
                    </div>
                    <div class="bg-white p-6 rounded-2xl shadow-sm border">
                        <h3 class="text-slate-400 text-sm">Tugas Selesai</h3>
                        <p class="text-2xl font-bold mt-1">${myGrades.length}</p>
                    </div>
                    <div class="bg-white p-6 rounded-2xl shadow-sm border">
                        <h3 class="text-slate-400 text-sm">Rata-rata Nilai</h3>
                        <p class="text-2xl font-bold mt-1">${myGrades.length > 0 ? (myGrades.reduce((a,b) => a+b.nilai, 0)/myGrades.length).toFixed(1) : '-'}</p>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-sm border">
                    <h3 class="font-bold text-lg mb-4">Riwayat Nilai Terbaru</h3>
                    ${myGrades.length === 0 ? '<p class="text-slate-400 text-sm">Belum ada nilai.</p>' : `
                    <table class="w-full text-sm">
                        <thead><tr class="border-b"><th class="text-left py-2">Course</th><th class="text-left py-2">Nilai</th><th class="text-left py-2">Komentar</th></tr></thead>
                        <tbody>
                            ${myGrades.slice(0, 5).map(g => `
                                <tr class="border-b"><td class="py-2">${g.course?.judul_course}</td><td class="py-2 font-bold text-indigo-600">${g.nilai}</td><td class="py-2 text-slate-500">${g.komentar || '-'}</td></tr>
                            `).join('')}
                        </tbody>
                    </table>`}
                </div>
            `;
        }

        // --- COURSES LIST & DETAIL ---
        async function renderCourses() {
            const area = document.getElementById('content-area');
            const res = await fetch(`${API}/courses`, { headers: { 'Authorization': `Bearer ${TOKEN}` }});
            const courses = await res.json();

            area.innerHTML = `
                <h1 class="text-2xl font-bold mb-6">Kurikulum Course</h1>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    ${courses.map(c => `
                        <div onclick="openCourseDetail(${c.id})" class="bg-white p-5 rounded-2xl shadow-sm border cursor-pointer hover:shadow-md transition ${c.isLocked ? 'opacity-50' : ''}">
                            <div class="flex justify-between items-center mb-2">
                                <span class="text-xs font-bold text-indigo-600 bg-indigo-50 px-2 py-1 rounded">Modul ${c.urutan}</span>
                                ${c.isLocked ? '<i class="ri-lock-line text-slate-400"></i>' : '<i class="ri-arrow-right-line text-slate-400"></i>'}
                            </div>
                            <h3 class="font-bold text-lg">${c.judul_course}</h3>
                            <p class="text-slate-400 text-sm mt-1 line-clamp-2">${c.deskripsi}</p>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        async function openCourseDetail(id) {
            const res = await fetch(`${API}/course/${id}`, { headers: { 'Authorization': `Bearer ${TOKEN}` }});
            const data = await res.json();
            if (data.course.isLocked) { Swal.fire('Terkunci', 'Selesaikan level sebelumnya atau upgrade paket.', 'warning'); return; }
            
            const c = data.course;
            const t = data.myTugas;

            const area = document.getElementById('content-area');
            area.innerHTML = `
                <button onclick="renderCourses()" class="text-indigo-600 font-semibold text-sm mb-4"><i class="ri-arrow-left-line"></i> Kembali ke Daftar</button>
                
                <div class="bg-white p-8 rounded-2xl shadow-sm border mb-6">
                    <span class="text-xs font-bold text-indigo-600">Modul ${c.urutan}</span>
                    <h1 class="text-2xl font-bold mt-1">${c.judul_course}</h1>
                    <p class="text-slate-500 mt-4 whitespace-pre-wrap">${c.deskripsi || 'Tidak ada deskripsi.'}</p>
                    
                    <div class="mt-6 flex gap-4">
                        <a href="${c.link_drive}" target="_blank" class="px-4 py-2 bg-blue-600 text-white rounded-xl text-sm font-semibold"><i class="ri-video-line"></i> Lihat Video</a>
                        <a href="${c.file_template_url}" target="_blank" class="px-4 py-2 bg-slate-800 text-white rounded-xl text-sm font-semibold"><i class="ri-download-line"></i> Download Template</a>
                    </div>
                </div>

                <div class="bg-white p-8 rounded-2xl shadow-sm border">
                    <h3 class="font-bold text-lg mb-4">Tugas Anda</h3>
                    ${t ? `
                        <div class="bg-green-50 p-4 rounded-xl mb-4 flex justify-between items-center">
                            <div>
                                <p class="text-green-800 font-semibold">Sudah Dikumpulkan</p>
                                <a href="${t.file_url}" target="_blank" class="text-xs text-blue-600 underline">Lihat File Anda</a>
                            </div>
                            <div class="text-right">
                                ${t.nilai ? `<p class="text-2xl font-bold text-indigo-600">${t.nilai}</p><p class="text-xs text-slate-500">${t.komentar || ''}</p>` : '<p class="text-yellow-600 font-semibold">Menunggu Nilai</p>'}
                            </div>
                        </div>
                    ` : `
                        <div class="border-2 border-dashed rounded-xl p-6 text-center">
                            <input type="file" id="fileInput" class="hidden" onchange="handleUpload(${c.id})">
                            <button onclick="document.getElementById('fileInput').click()" class="px-6 py-3 bg-indigo-600 text-white rounded-xl font-semibold">Upload Jawaban</button>
                            <p class="text-xs text-slate-400 mt-2">Format: PDF, XLSX, DOCX</p>
                        </div>
                    `}
                </div>
            `;
        }

        async function handleUpload(courseId) {
            const file = document.getElementById('fileInput').files[0];
            if(!file) return;
            
            Swal.fire({ title: 'Mengupload...', didOpen: () => { Swal.showLoading() }});
            
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                const base64 = reader.result.split(',')[1];
                await fetch(`${API}/upload-tugas`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${TOKEN}` },
                    body: JSON.stringify({ courseId, fileName: file.name, fileData: base64 })
                });
                Swal.fire('Sukses', 'Tugas terkirim!', 'success');
                openCourseDetail(courseId); // Refresh
            };
        }

        // --- SOSIAL (CHAT) ---
        async function renderSosial() {
            const area = document.getElementById('content-area');
            // Ambil daftar teman
            const resF = await fetch(`${API}/friends`, { headers: { 'Authorization': `Bearer ${TOKEN}` }});
            const friends = await resF.json();

            area.innerHTML = `
                <h1 class="text-2xl font-bold mb-4">Sosial & Chat</h1>
                <div class="flex gap-4 mb-4 border-b">
                    <button onclick="switchSosialTab('room')" id="tab-room" class="px-4 py-2 font-bold border-b-2 border-indigo-600 text-indigo-600">Chat Room</button>
                    <button onclick="switchSosialTab('private')" id="tab-private" class="px-4 py-2 font-bold text-slate-400">Chat Pribadi</button>
                </div>

                <!-- Chat Room -->
                <div id="view-room">
                    <div class="bg-white rounded-2xl shadow-sm border p-4 h-[60vh] flex flex-col">
                        <h3 class="font-bold mb-2">Room: ${USER.paket_aktif}</h3>
                        <div id="chat-room-box" class="flex-1 overflow-y-auto space-y-2 mb-2"></div>
                        <div class="flex gap-2">
                            <input type="text" id="msg-room" class="flex-1 bg-slate-50 px-4 py-2 rounded-xl" placeholder="Ketik pesan...">
                            <button onclick="sendRoomChat()" class="px-4 bg-indigo-600 text-white rounded-xl"><i class="ri-send-plane-fill"></i></button>
                        </div>
                    </div>
                </div>

                <!-- Chat Pribadi -->
                <div id="view-private" class="hidden grid grid-cols-3 gap-4 h-[70vh]">
                    <div class="col-span-1 bg-white rounded-2xl shadow-sm border p-4 overflow-y-auto">
                        <div class="flex justify-between items-center mb-2">
                            <h3 class="font-bold">Teman (${friends.length}/10)</h3>
                            <button onclick="addFriendUI()" class="text-indigo-600"><i class="ri-user-add-line"></i></button>
                        </div>
                        <div class="space-y-2">
                            ${friends.map(f => `
                                <div onclick="loadPrivateChat('${f.id}', '${f.nama}')" class="p-2 hover:bg-slate-50 rounded-xl cursor-pointer flex items-center gap-2">
                                    <div class="w-8 h-8 bg-indigo-100 rounded-full flex items-center justify-center text-indigo-600 font-bold">${f.nama.charAt(0)}</div>
                                    <div>
                                        <p class="font-semibold text-sm">${f.nama}</p>
                                        <p class="text-xs text-slate-400">${f.kode_unik}</p>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    <div class="col-span-2 bg-white rounded-2xl shadow-sm border p-4 flex flex-col">
                        <div id="chat-private-header" class="font-bold border-b pb-2 mb-2">Pilih teman untuk chat</div>
                        <div id="chat-private-box" class="flex-1 overflow-y-auto space-y-2 mb-2"></div>
                        <div class="flex gap-2">
                            <input type="text" id="msg-private" class="flex-1 bg-slate-50 px-4 py-2 rounded-xl" placeholder="Ketik pesan...">
                            <button onclick="sendPrivateChat()" class="px-4 bg-indigo-600 text-white rounded-xl"><i class="ri-send-plane-fill"></i></button>
                        </div>
                    </div>
                </div>
            `;
            loadRoomChat();
        }

        function switchSosialTab(tab) {
            document.getElementById('view-room').classList.toggle('hidden', tab !== 'room');
            document.getElementById('view-private').classList.toggle('hidden', tab !== 'private');
            document.getElementById('tab-room').classList.toggle('border-indigo-600', tab === 'room');
            document.getElementById('tab-room').classList.toggle('text-indigo-600', tab === 'room');
            document.getElementById('tab-private').classList.toggle('border-indigo-600', tab === 'private');
            document.getElementById('tab-private').classList.toggle('text-indigo-600', tab === 'private');
        }

        let ACTIVE_FRIEND = null;
        
        async function loadRoomChat() {
            if(USER.role === 'teacher') return; // Teacher perlu pilih kelas, simplify dulu
            const res = await fetch(`${API}/chat-room`, { headers: { 'Authorization': `Bearer ${TOKEN}` }});
            const chats = await res.json();
            const box = document.getElementById('chat-room-box');
            box.innerHTML = chats.map(c => `
                <div class="flex ${c.user_id === USER.id ? 'justify-end' : ''}">
                    <div class="px-3 py-1 rounded-xl ${c.user_id === USER.id ? 'bg-indigo-600 text-white' : 'bg-slate-100'}">
                        <span class="text-xs font-bold block opacity-70">${c.akun?.nama || 'Anon'} (${c.akun?.kode_unik})</span>
                        ${c.pesan}
                    </div>
                </div>
            `).join('');
            box.scrollTop = box.scrollHeight;
        }

        async function sendRoomChat() {
            const input = document.getElementById('msg-room');
            if(!input.value) return;
            await fetch(`${API}/chat-room`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${TOKEN}` },
                body: JSON.stringify({ pesan: input.value })
            });
            input.value = '';
            loadRoomChat();
        }

        async function loadPrivateChat(friendId, friendName) {
            ACTIVE_FRIEND = friendId;
            document.getElementById('chat-private-header').innerText = `Chat dengan ${friendName}`;
            const res = await fetch(`${API}/chat-pribadi/${friendId}`, { headers: { 'Authorization': `Bearer ${TOKEN}` }});
            const chats = await res.json();
            const box = document.getElementById('chat-private-box');
            box.innerHTML = chats.map(c => `
                <div class="flex ${c.pengirim_id === USER.id ? 'justify-end' : ''}">
                    <div class="px-3 py-1 rounded-xl ${c.pengirim_id === USER.id ? 'bg-green-600 text-white' : 'bg-slate-100'}">
                        ${c.pesan}
                    </div>
                </div>
            `).join('');
            box.scrollTop = box.scrollHeight;
        }

        async function sendPrivateChat() {
            if(!ACTIVE_FRIEND) return;
            const input = document.getElementById('msg-private');
            if(!input.value) return;
            await fetch(`${API}/chat-pribadi`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${TOKEN}` },
                body: JSON.stringify({ penerima_id: ACTIVE_FRIEND, pesan: input.value })
            });
            input.value = '';
            loadPrivateChat(ACTIVE_FRIEND, 'Memuat...');
        }

        async function addFriendUI() {
            const { value: kode } = await Swal.fire({
                title: 'Tambah Teman',
                input: 'text',
                inputLabel: 'Masukkan ID Teman (contoh: NU-1234)',
                showCancelButton: true
            });
            if (kode) {
                const res = await fetch(`${API}/search-friend?kode=${kode}`, { headers: { 'Authorization': `Bearer ${TOKEN}` }});
                const data = await res.json();
                if (res.ok) {
                    const conf = await Swal.fire({ title: `Tambahkan ${data.nama}?`, icon: 'question', showCancelButton: true });
                    if(conf.isConfirmed) {
                        await fetch(`${API}/add-friend`, {
                            method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${TOKEN}` },
                            body: JSON.stringify({ friendId: data.id })
                        });
                        Swal.fire('Sukses', 'Teman ditambahkan', 'success');
                        renderSosial();
                    }
                } else {
                    Swal.fire('Error', data.error, 'error');
                }
            }
        }

        // --- TEACHER ADMIN ---
        async function renderAdminStudents() {
            const res = await fetch(`${API}/admin/students`, { headers: { 'Authorization': `Bearer ${TOKEN}` }});
            const users = await res.json();
            const area = document.getElementById('content-area');
            area.innerHTML = `
                <h1 class="text-2xl font-bold mb-4">Kelola Siswa</h1>
                <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
                    <table class="w-full text-sm">
                        <thead class="bg-slate-50 border-b"><tr>
                            <th class="text-left p-3">Nama</th><th class="text-left p-3">ID</th><th class="text-left p-3">Paket</th><th class="text-left p-3">Aksi</th>
                        </tr></thead>
                        <tbody>
                            ${users.map(u => `
                                <tr class="border-b hover:bg-slate-50">
                                    <td class="p-3 font-semibold">${u.nama}</td>
                                    <td class="p-3 text-slate-400 font-mono text-xs">${u.kode_unik}</td>
                                    <td class="p-3">${u.paket_aktif}</td>
                                    <td class="p-3">
                                        <button onclick="updatePaket('${u.id}')" class="text-xs bg-indigo-100 text-indigo-700 px-2 py-1 rounded">Ubah Paket</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        async function updatePaket(userId) {
            const { value: paket } = await Swal.fire({
                title: 'Pilih Paket',
                input: 'select',
                inputOptions: { 'Bisa Excel': 'Bisa Excel', 'Jago Excel': 'Jago Excel', 'Ahli Excel': 'Ahli Excel' },
                showCancelButton: true
            });
            if(paket) {
                await fetch(`${API}/admin/update-paket`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${TOKEN}` },
                    body: JSON.stringify({ userId, paket })
                });
                Swal.fire('Updated', 'Paket siswa diubah', 'success');
                renderAdminStudents();
            }
        }

        async function renderSubmissions() {
            const res = await fetch(`${API}/submissions`, { headers: { 'Authorization': `Bearer ${TOKEN}` }});
            const subs = await res.json();
            const area = document.getElementById('content-area');
            area.innerHTML = `
                <h1 class="text-2xl font-bold mb-4">Penilaian Tugas</h1>
                <div class="bg-white rounded-2xl shadow-sm border overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead class="bg-slate-50 border-b"><tr>
                            <th class="text-left p-3">Siswa</th><th class="text-left p-3">Course</th><th class="text-left p-3">File</th><th class="text-left p-3">Status</th><th class="text-left p-3">Aksi</th>
                        </tr></thead>
                        <tbody>
                            ${subs.map(s => `
                                <tr class="border-b">
                                    <td class="p-3">${s.akun?.nama} <span class="text-xs text-slate-400">(${s.akun?.kode_unik})</span></td>
                                    <td class="p-3">${s.course?.judul_course}</td>
                                    <td class="p-3"><a href="${s.file_url}" target="_blank" class="text-indigo-600 underline">Lihat</a></td>
                                    <td class="p-3">${s.nilai ? `<span class="font-bold text-green-600">${s.nilai}</span>` : '<span class="text-yellow-600">Pending</span>'}</td>
                                    <td class="p-3">
                                        <button onclick="giveGrade(${s.id})" class="text-xs bg-green-100 text-green-700 px-2 py-1 rounded">Nilai</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        async function giveGrade(tugasId) {
            const { value: formValues } = await Swal.fire({
                title: 'Beri Nilai',
                html: `<input id="swal-nilai" type="number" class="swal2-input" placeholder="Nilai (0-100)">
                       <input id="swal-komentar" class="swal2-input" placeholder="Komentar (Opsional)">`,
                preConfirm: () => ({ nilai: document.getElementById('swal-nilai').value, komentar: document.getElementById('swal-komentar').value })
            });
            if (formValues && formValues.nilai) {
                await fetch(`${API}/grade`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${TOKEN}` },
                    body: JSON.stringify({ tugasId, nilai: formValues.nilai, komentar: formValues.komentar })
                });
                Swal.fire('Sukses', 'Nilai disimpan', 'success');
                renderSubmissions();
            }
        }
    </script>
</body>
</html>
